name: supershop

services:
  mongo:
    image: mongo:8
    command: ["--replSet", "rs0", "--bind_ip_all"]
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.runCommand({ ping: 1 }).ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  # One-shot: initiates the single-node replica set so transactions work.
  mongo-init:
    image: mongo:8
    depends_on:
      mongo:
        condition: service_healthy
    restart: "no"
    volumes:
      - ./mongo-rs-init.js:/init.js:ro
    entrypoint: ["mongosh", "--host", "mongo:27017", "--quiet", "/init.js"]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Optional admin UI: `docker compose --profile tools up`
  mongo-express:
    image: mongo-express:latest
    profiles: ["tools"]
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: "mongodb://mongo:27017/?replicaSet=rs0"
      ME_CONFIG_BASICAUTH: "false"

volumes:
  mongo-data:
  redis-data:
